*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}

/* ---------- SIDEBAR ---------- */
#sidebar{
  position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w);
  background-color:var(--bar-bg);
  background-image: radial-gradient(circle at 0% 0%, rgba(56,140,255,0.35), transparent 42%), var(--network-pattern);
  background-repeat: no-repeat, repeat; background-attachment: fixed, fixed;
  border-right:1px solid var(--bar-border);
  display:flex; flex-direction:column; z-index:10;
}
.brand{ padding:18px 18px 16px; border-bottom:1px solid var(--bar-border); flex-shrink:0; position:relative; z-index:1; }
.brand-logo-chip{ background:#fff; border-radius:10px; padding:9px 14px; display:inline-block; box-shadow:0 2px 10px rgba(0,0,0,.18); }
.brand img{ max-width:100%; height:auto; display:block; }
.brand-sub{ font-size:10.5px; color:var(--bar-text-muted); font-weight:500; margin-top:8px; letter-spacing:.02em; }

nav{ padding:14px 12px; flex:1; overflow-y:auto; }
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px;
  font-size:13.5px; font-weight:500; color:var(--bar-text); cursor:pointer; margin-bottom:2px;
  transition:background .12s;
}
.nav-item:hover{ background:rgba(255,255,255,0.10); }
.nav-item.active{ background:rgba(56,189,248,0.22); box-shadow:inset 3px 0 0 #38bdf8; color:#fff; }
.nav-item .ic{ width:16px; text-align:center; font-size:14px; flex-shrink:0; }
.nav-item .chev{ margin-left:auto; font-size:10px; transition:transform .15s; opacity:.6; }
.nav-item.expanded .chev{ transform:rotate(90deg); }
.submenu{ max-height:0; overflow:hidden; transition:max-height .18s ease; padding-left:14px; }
.submenu.open{ max-height:400px; }
.submenu .nav-item{ font-size:12.5px; font-weight:400; padding:7px 12px; }

.sidebar-footer{ flex-shrink:0; border-top:1px solid var(--bar-border); padding:10px 0; background:rgba(0,0,0,0.16); position:relative; z-index:1; }
.sidebar-footer img{ width:100%; height:auto; display:block; opacity:.95; }
.sidebar-footer .caption{ font-size:9px; color:var(--bar-text-muted); text-align:center; text-transform:uppercase; letter-spacing:.06em; padding:4px 0 2px; font-weight:600; }

/* ---------- MAIN ---------- */
#main{ margin-left:var(--sidebar-w); min-height:100vh; }
.topbar{
  background-color:var(--bar-bg);
  background-image: radial-gradient(circle at 100% 0%, rgba(56,140,255,0.35), transparent 42%), var(--network-pattern);
  background-repeat: no-repeat, repeat; background-attachment: fixed, fixed;
  border-bottom:1px solid var(--bar-border); padding:22px 36px 20px;
  display:flex; justify-content:space-between; align-items:flex-start;
  position:relative; overflow:hidden;
}
.topbar-network{ position:absolute; right:28px; top:50%; transform:translateY(-50%); width:210px; height:76px; pointer-events:none; opacity:.95; }
@media (max-width:900px){ .topbar-network{ display:none; } }
.topbar h1{ font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#fff; position:relative; z-index:1; }
.topbar p{ font-size:13px; color:var(--bar-text-muted); margin-top:4px; position:relative; z-index:1; }
.content{ padding:26px 36px 60px; }

/* KPI cards */
.kpi-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:14px; margin-bottom:26px; }
.kpi{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 16px 14px; }
.kpi .label{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; margin-bottom:8px; }
.kpi .value{ font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700; color:var(--navy); }
.kpi .value.status{ font-size:13px; padding:3px 10px; border-radius:20px; display:inline-block; }
.status-nao{ background:#fdf1e4; color:var(--warn); }
.status-and{ background:#e6f0fb; color:var(--blue); }
.status-con{ background:#e6f4ee; color:var(--good); }
.status-futuro{ background:#f1f3f6; color:var(--grey); }

.section-title{
  font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; color:var(--navy);
  margin:28px 0 14px; display:flex; align-items:center; gap:8px;
}
.section-title .tag{ font-size:10.5px; font-weight:600; color:var(--blue); background:var(--blue-light); padding:2px 8px; border-radius:20px; }

/* Year / entity cards */
.entity-card{
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:18px 22px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:20px;
}
.entity-card .left{ min-width:120px; }
.entity-card .left .name{ font-family:'Space Grotesk'; font-size:17px; font-weight:700; color:var(--navy); }
.entity-card .left .status{ font-size:10px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; margin-top:4px; padding:2px 8px; border-radius:20px; display:inline-block; }
.entity-card .stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:22px; flex:1; }
.entity-card .stat .k{ font-size:10px; text-transform:uppercase; color:var(--muted); font-weight:600; letter-spacing:.03em; }
.entity-card .stat .v{ font-size:13px; font-weight:600; color:var(--text); margin-top:2px; }

/* Grid layouts */
.grid-2{ display:grid; grid-template-columns:1.3fr 1fr; gap:18px; }
.grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.panel{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 22px; }
.panel h3{ font-size:13.5px; font-weight:600; color:var(--text); margin-bottom:14px; }
.chart-box{ position:relative; height:260px; }
.chart-box.sm{ height:200px; }

table{ width:100%; border-collapse:collapse; font-size:12.5px; }
th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--border); }
td{ padding:9px 10px; border-bottom:1px solid #eef1f5; color:var(--text); }
tr:last-child td{ border-bottom:none; }
td.num{ text-align:right; font-variant-numeric:tabular-nums; }
.pct-pill{ display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; }

.empty-state{ text-align:center; padding:30px 20px; color:var(--muted); font-size:12.5px; }

.page{ display:none; }
.page.active{ display:block; }

@media (max-width:1100px){
  .kpi-row{ grid-template-columns:repeat(2,1fr); }
  .grid-2,.grid-3{ grid-template-columns:1fr; }
  .entity-card .stats{ grid-template-columns:repeat(2,1fr); }
}
</style>
